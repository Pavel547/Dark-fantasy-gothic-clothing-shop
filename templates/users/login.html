{% extends 'base.html' %}
{% block content %}
  <div class="relative h-screen w-full overflow-hidden">
    <div class="absolute inset-0 flex items-center justify-center">
      <form action="{% url 'users:login' %}" method="post" class="shadow-xl/30 mx-w-2xl px-3 py-3">
        {% csrf_token %}
        <div>
          <a href="{% url 'main:catalog_all' %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" class="bi bi-arrow-left-circle mb-6 text-gray-400" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M1 8a7 7 0 1 0 14 0A7 7 0 0 0 1 8m15 0A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-4.5-.5a.5.5 0 0 1 0 1H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5z" />
            </svg>
          </a>
        </div>
        <div class="grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-2 lg:gap-10 mb-6">
          <div>{{ form.username }}</div>
          <div>{{ form.password }}</div>
        </div>
        <div class="grid sm:grid-cols-1 lg:grid-cols-2 gap-2 lg:gap-10">
          <button type="submit" class="text-center text-xl px-3 py-3 border-1 border-gray-900 hover:text-gray-200 hover:bg-gray-900 transition-color duration-700">Log in</button>
          <a href="{% url 'users:register' %}" class="text-center text-xl px-3 py-3 border-1 border-gray-900 hover:text-gray-300 hover:bg-gray-900 transition-color duration-700">Create account</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
